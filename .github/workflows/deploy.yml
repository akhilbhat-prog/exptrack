name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r categorizer/requirements.txt pytest

      - run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: asia-south1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: asia-south1-docker.pkg.dev/exptrack-privet-drive/exptrack/exptrack:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: exptrack
          region: asia-south1
          image: asia-south1-docker.pkg.dev/exptrack-privet-drive/exptrack/exptrack:latest
          flags: >-
            --allow-unauthenticated
            --update-secrets=SECRET_KEY=flask-secret-key:latest,INVITE_CODE=invite-code:latest,ADMIN_TOKEN=admin-token:latest,DATABASE_URL=neon-database-url:latest,GMAIL_CLIENT_ID=gmail-client-id:latest,GMAIL_CLIENT_SECRET=gmail-client-secret:latest,GMAIL_REFRESH_TOKEN=gmail-refresh-token:latest
            --set-env-vars=NOTIFICATION_EMAIL=akhilbhat88@yahoo.in
