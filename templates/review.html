<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Review · FinTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #21212e;
    --border: #2a2a38;
    --border2: #33334a;
    --text: #f0f0f5;
    --muted: #7878a0;
    --muted2: #555570;
    --green: #22c55e;
    --red: #ef4444;
    --teal: #2dd4bf;
    --blue: #60a5fa;
    --yellow: #facc15;
    --orange: #fb923c;
    --green-dim: rgba(34,197,94,0.12);
    --red-dim: rgba(239,68,68,0.12);
    --teal-dim: rgba(45,212,191,0.12);
    --blue-dim: rgba(96,165,250,0.12);
    --yellow-dim: rgba(250,204,21,0.12);
    --orange-dim: rgba(251,146,60,0.12);
    --row-hover: #1f1f2e;
    --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.18s ease;
  }

  body.light {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --border: #e2e2ec;
    --border2: #d0d0de;
    --text: #111118;
    --muted: #7070a0;
    --muted2: #9090b8;
    --green: #16a34a;
    --red: #dc2626;
    --teal: #0d9488;
    --blue: #2563eb;
    --yellow: #ca8a04;
    --orange: #ea580c;
    --green-dim: rgba(22,163,74,0.10);
    --red-dim: rgba(220,38,38,0.10);
    --teal-dim: rgba(13,148,136,0.10);
    --blue-dim: rgba(37,99,235,0.10);
    --yellow-dim: rgba(202,138,4,0.10);
    --orange-dim: rgba(234,88,12,0.10);
    --row-hover: #f0f0f8;
  }

  body, body * {
    transition: background-color 0.35s ease, border-color 0.35s ease, color 0.35s ease;
  }
  .toggle-thumb { transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.35s ease !important; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .page-wrapper { max-width: 1440px; margin: 0 auto; padding: 0 24px 60px; }

  /* ── Header ── */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .site-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-date { font-size: 13px; color: var(--muted); }

  /* ── Theme Toggle ── */
  .theme-toggle {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none; cursor: pointer; padding: 4px; border-radius: 20px;
  }
  .toggle-icon { font-size: 14px; line-height: 1; user-select: none; }
  .toggle-track {
    position: relative; width: 44px; height: 24px;
    background: var(--border2); border-radius: 100px; border: 1px solid var(--border);
    transition: background 0.35s ease, border-color 0.35s ease; flex-shrink: 0;
  }
  body.light .toggle-track { background: var(--teal); border-color: var(--teal); }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
    border-radius: 50%; background: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  body.light .toggle-thumb { transform: translateX(20px); background: #ffffff; }

  /* ── Two-column content ── */
  .content-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: sticky;
    top: 20px;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .batch-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  .batch-item:last-child { border-bottom: none; }
  .batch-item:hover { background: var(--row-hover); }
  .batch-item.active { background: var(--teal-dim); border-left: 3px solid var(--teal); padding-left: 13px; }
  .batch-item-title { font-size: 13px; font-weight: 600; }
  .batch-item-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  .batch-empty { padding: 28px 16px; text-align: center; font-size: 12px; color: var(--muted2); }

  /* ── Main panel ── */
  .main-panel { min-width: 0; }

  /* ── Section card ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .section-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .section-actions { display: flex; gap: 8px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: var(--transition); font-family: var(--font);
  }
  .btn-primary { background: var(--teal); color: #0a0a10; }
  .btn-primary:hover:not(:disabled) { background: #25c0ab; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid transparent; }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 12px; text-align: left;
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.6px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.saving { opacity: 0.6; }
  tbody tr.saved td:first-child::before {
    content: '✓';
    position: absolute;
    left: 4px;
    font-size: 10px;
    color: var(--green);
  }
  tbody tr.saved { position: relative; }

  td {
    padding: 10px 12px; font-size: 13px; vertical-align: middle;
  }
  td.right { text-align: right; }
  td.date-cell { white-space: nowrap; color: var(--muted); font-size: 12px; }

  /* ── Merchant cell ── */
  .merchant-name { font-weight: 600; font-size: 13px; }
  .merchant-entry { font-size: 11px; color: var(--muted2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

  /* ── Amount ── */
  .amt-debit  { color: var(--red);   font-weight: 600; }
  .amt-credit { color: var(--green); font-weight: 600; }

  /* ── Inline combo (input + datalist) ── */
  .combo-wrap { position: relative; }
  .combo-arrow {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: var(--muted2); pointer-events: none; user-select: none;
  }
  .inline-combo {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 5px 22px 5px 8px;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    outline: none;
    width: 100%;
    min-width: 90px;
    transition: border-color var(--transition), background var(--transition);
  }
  .inline-combo:focus { border-color: var(--teal); }
  .inline-combo:read-only { opacity: 0.6; cursor: default; }

  /* ── Pred hint ── */
  .pred-hint {
    font-size: 10px;
    color: var(--muted2);
    margin-top: 3px;
    white-space: nowrap;
  }
  .pred-hint.changed { color: var(--orange); }

  /* ── Source badge ── */
  .source-badge {
    display: inline-flex; align-items: center;
    padding: 2px 7px; border-radius: 100px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap;
  }
  .source-memory   { background: var(--teal-dim);   color: var(--teal); }
  .source-rule     { background: var(--blue-dim);   color: var(--blue); }
  .source-ml       { background: var(--yellow-dim); color: var(--yellow); }
  .source-none     { background: var(--border);     color: var(--muted); }

  /* ── Confidence ── */
  .confidence { font-size: 10px; color: var(--muted2); margin-top: 2px; }

  /* ── Row action buttons (revert / delete) ── */
  .row-action-btn {
    width: 26px; height: 26px; border-radius: 5px; border: none;
    background: transparent; color: var(--muted2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: var(--transition);
    font-family: var(--font);
  }
  .row-action-btn:hover { background: var(--surface2); color: var(--text); }
  .row-action-btn.delete:hover { background: var(--red-dim); color: var(--red); }
  .row-actions { display: flex; gap: 2px; }

  /* ── Sidebar toggle ── */
  .sidebar-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; color: var(--muted);
    padding: 0; font-family: var(--font);
    transition: color var(--transition);
  }
  .sidebar-toggle:hover { color: var(--text); }
  .sidebar-toggle.active { color: var(--teal); }

  /* ── Empty / loading states ── */
  .empty-state {
    text-align: center; padding: 52px 20px; color: var(--muted); font-size: 13px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.35; display: block; }
  .loading-state {
    text-align: center; padding: 40px; color: var(--muted2); font-size: 12px;
  }

  /* ── Pills ── */
  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 100px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .pill-pending  { background: var(--yellow-dim); color: var(--yellow); }
  .pill-reviewed { background: var(--teal-dim);   color: var(--teal); }
  .pill-complete { background: var(--border);     color: var(--muted); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border2);
    border-left: 3px solid var(--teal);
    border-radius: var(--radius-sm); padding: 12px 18px;
    font-size: 13px; font-weight: 500; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateX(110%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
  }
  .toast.show  { transform: translateX(0); }
  .toast.error { border-left-color: var(--red); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <header class="site-header">
    <div class="site-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <polyline points="2,13 6,8 10,10 16,4" stroke="#0a0a10" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="4" r="2" fill="#0a0a10"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">FinTrack</div>
        <div class="logo-sub">Batch Review</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark theme">
        <span class="toggle-icon">🌙</span>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-icon">☀️</span>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="content-layout">

    <!-- Sidebar: batch list -->
    <aside class="sidebar">
      <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between">
        <span>Batches</span>
        <button class="sidebar-toggle" id="btnShowAll" onclick="toggleShowAll()">Show all</button>
      </div>
      <div id="batchList">
        <div class="loading-state">Loading…</div>
      </div>
    </aside>

    <!-- Main panel -->
    <div class="main-panel">

      <!-- Empty state (no batch selected) -->
      <div id="emptyState" class="section-card">
        <div class="empty-state">
          <span class="icon">📋</span>
          Select a batch from the sidebar to start reviewing.
        </div>
      </div>

      <!-- Batch view (shown when batch is selected) -->
      <div id="batchView" class="section-card" style="display:none">
        <div class="section-header">
          <div>
            <div class="section-title" id="batchTitle"></div>
            <div class="section-subtitle" id="batchSubtitle"></div>
          </div>
          <div class="section-actions">
            <button class="btn btn-ghost" id="btnMarkReviewed" onclick="markReviewed()">
              ✓ Mark Reviewed
            </button>
            <button class="btn btn-primary" id="btnComplete" onclick="completeBatch()">
              ✦ Complete Batch
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:80px">Date</th>
                <th>Merchant</th>
                <th class="right" style="width:100px">Amount</th>
                <th style="width:130px">Category</th>
                <th style="width:150px">Subcategory</th>
                <th style="width:110px">Type</th>
                <th style="width:72px">Source</th>
                <th style="width:56px"></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- end main-panel -->
  </div><!-- end content-layout -->

</div><!-- end page-wrapper -->

<div class="toast" id="toast"></div>

<datalist id="type-options">
  <option value="expense">
  <option value="income">
  <option value="investment">
  <option value="transfer">
</datalist>
<datalist id="cat-options"></datalist>
<datalist id="sub-options"></datalist>

<script>
const REVIEW_TOKEN = {{ review_token | tojson }};

/* ── State ── */
let categories   = {};    // { "Food": ["Eating Out", "Ordering In"], ... }
let currentBatch = null;  // { id, row_count, status, created_at }
let currentItems = [];    // array of item objects
let showAllBatches = false;
const TYPES = ['expense', 'income', 'investment', 'transfer'];

/* ── API helpers ── */
function apiUrl(path) {
  if (!REVIEW_TOKEN) return path;
  const sep = path.includes('?') ? '&' : '?';
  return `${path}${sep}token=${encodeURIComponent(REVIEW_TOKEN)}`;
}
async function apiCall(path, opts = {}) {
  return fetch(apiUrl(path), opts);
}

/* ── Toast ── */
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── Theme ── */
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
function setupTheme() {
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
}

/* ── Date ── */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
}
function fmtAmt(n) {
  return '₹ ' + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Sidebar all-batches toggle ── */
function toggleShowAll() {
  showAllBatches = !showAllBatches;
  const btn = document.getElementById('btnShowAll');
  btn.textContent = showAllBatches ? 'Hide completed' : 'Show all';
  btn.classList.toggle('active', showAllBatches);
  loadBatches();
}

/* ── Batch list ── */
async function loadBatches() {
  try {
    const url = showAllBatches ? '/api/batches?include_complete=1' : '/api/batches';
    const resp = await apiCall(url);
    if (!resp.ok) throw new Error(resp.statusText);
    const batches = await resp.json();
    renderBatchList(batches);
  } catch (e) {
    document.getElementById('batchList').innerHTML =
      '<div class="batch-empty">Failed to load batches.</div>';
  }
}

function renderBatchList(batches) {
  const el = document.getElementById('batchList');
  if (!batches.length) {
    el.innerHTML = '<div class="batch-empty">No pending batches.</div>';
    return;
  }
  el.innerHTML = batches.map(b => {
    const active = currentBatch && currentBatch.id === b.id ? ' active' : '';
    const statusPill = `<span class="pill pill-${b.status}">${b.status}</span>`;
    const date = fmtDate(b.created_at);
    return `<div class="batch-item${active}" onclick="selectBatch(${b.id})" data-batch-id="${b.id}">
      <div class="batch-item-title">Batch #${b.id}</div>
      <div class="batch-item-meta">${b.row_count} items &nbsp;${statusPill}</div>
      <div class="batch-item-meta">${date}</div>
    </div>`;
  }).join('');
}

/* ── Select & load a batch ── */
async function selectBatch(id) {
  document.getElementById('emptyState').style.display = 'none';
  const batchView = document.getElementById('batchView');
  batchView.style.display = '';
  document.getElementById('itemsBody').innerHTML =
    '<tr><td colspan="8"><div class="loading-state">Loading items…</div></td></tr>';
  document.getElementById('batchTitle').textContent = `Batch #${id}`;
  document.getElementById('batchSubtitle').textContent = '';

  try {
    const resp = await apiCall(`/api/batches/${id}`);
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();
    currentBatch = data.batch;
    currentItems = data.items;
    updateBatchHeader();
    renderItems(data.items);
    highlightSidebarItem(id);
  } catch (e) {
    document.getElementById('itemsBody').innerHTML =
      '<tr><td colspan="8"><div class="empty-state"><span class="icon">⚠️</span>Failed to load batch items.</div></td></tr>';
  }
}

function highlightSidebarItem(id) {
  document.querySelectorAll('.batch-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.batchId) === id);
  });
}

function updateBatchHeader() {
  if (!currentBatch) return;
  document.getElementById('batchTitle').textContent =
    `Batch #${currentBatch.id}`;
  document.getElementById('batchSubtitle').textContent =
    `${currentBatch.row_count} items · ${currentBatch.status}`;

  const isPending    = currentBatch.status === 'pending';
  const isReviewed   = currentBatch.status === 'reviewed';
  const isComplete   = currentBatch.status === 'complete';

  document.getElementById('btnMarkReviewed').style.display = isComplete ? 'none' : '';
  document.getElementById('btnComplete').style.display     = isComplete ? 'none' : '';
  document.getElementById('btnMarkReviewed').disabled = !isPending;
  document.getElementById('btnComplete').disabled     = !isReviewed;
}

/* ── Datalist population ── */
function populateCatDatalist() {
  const dl = document.getElementById('cat-options');
  dl.innerHTML = Object.keys(categories).sort()
    .map(c => `<option value="${escHtml(c)}">`).join('');
}

function syncSubDatalist(txnId) {
  const item = currentItems.find(i => i.transaction_id === txnId);
  const cat  = item ? item.category : '';
  document.getElementById('sub-options').innerHTML =
    (categories[cat] || []).map(s => `<option value="${escHtml(s)}">`).join('');
}

/* ── Render items table ── */
function renderItems(items) {
  const body = document.getElementById('itemsBody');
  if (!items.length) {
    body.innerHTML =
      '<tr><td colspan="8"><div class="empty-state"><span class="icon">📭</span>No items in this batch.</div></td></tr>';
    return;
  }

  const isComplete = currentBatch && currentBatch.status === 'complete';

  body.innerHTML = items.map(item => {
    const txnId = item.transaction_id;
    const catChanged = item.category !== item.pred_category;
    const subChanged = item.subcategory !== item.pred_subcategory;
    const predHintCat = `<div class="pred-hint ${catChanged ? 'changed' : ''}">ML: ${escHtml(item.pred_category) || '—'}</div>`;
    const predHintSub = `<div class="pred-hint ${subChanged ? 'changed' : ''}">ML: ${escHtml(item.pred_subcategory) || '—'}</div>`;
    const amtClass = item.type === 'income' ? 'amt-credit' : 'amt-debit';
    const amtSign  = item.type === 'income' ? '+' : '−';
    const conf = item.pred_confidence != null
      ? `<div class="confidence">${(item.pred_confidence * 100).toFixed(0)}%</div>` : '';

    if (isComplete) {
      return `<tr data-txn="${txnId}">
        <td class="date-cell">${fmtDateShort(item.date)}</td>
        <td>
          <div class="merchant-name">${escHtml(item.merchant) || '—'}</div>
          <div class="merchant-entry" title="${escHtml(item.raw_entry)}">${escHtml(item.raw_entry)}</div>
        </td>
        <td class="right"><span class="${amtClass}">${amtSign}${fmtAmt(item.amount)}</span></td>
        <td><span style="font-size:12px">${escHtml(item.category) || '—'}</span>${predHintCat}</td>
        <td><span style="font-size:12px">${escHtml(item.subcategory) || '—'}</span>${predHintSub}</td>
        <td><span style="font-size:12px">${escHtml(item.type) || '—'}</span></td>
        <td><span class="source-badge source-${item.pred_source || 'none'}">${item.pred_source || 'none'}</span>${conf}</td>
        <td></td>
      </tr>`;
    }

    return `<tr data-txn="${txnId}">
      <td class="date-cell">${fmtDateShort(item.date)}</td>
      <td>
        <div class="merchant-name">${escHtml(item.merchant) || '—'}</div>
        <div class="merchant-entry" title="${escHtml(item.raw_entry)}">${escHtml(item.raw_entry)}</div>
      </td>
      <td class="right"><span class="${amtClass}">${amtSign}${fmtAmt(item.amount)}</span></td>
      <td>
        <div class="combo-wrap">
          <input class="inline-combo" list="cat-options" data-field="category" data-txn="${txnId}"
                 value="${escHtml(item.category)}" onchange="onFieldChange(this)">
          <span class="combo-arrow">▾</span>
        </div>
        ${predHintCat}
      </td>
      <td>
        <div class="combo-wrap">
          <input class="inline-combo" list="sub-options" data-field="subcategory" data-txn="${txnId}"
                 value="${escHtml(item.subcategory)}"
                 onfocus="syncSubDatalist(${txnId})" onchange="onFieldChange(this)">
          <span class="combo-arrow">▾</span>
        </div>
        ${predHintSub}
      </td>
      <td>
        <div class="combo-wrap">
          <input class="inline-combo" list="type-options" data-field="type" data-txn="${txnId}"
                 value="${escHtml(item.type)}" onchange="onFieldChange(this)">
          <span class="combo-arrow">▾</span>
        </div>
      </td>
      <td>
        <span class="source-badge source-${item.pred_source || 'none'}">${item.pred_source || 'none'}</span>
        ${conf}
      </td>
      <td>
        <div class="row-actions">
          <button class="row-action-btn" title="Revert to prediction" onclick="revertItem(${txnId})">↩</button>
          <button class="row-action-btn delete" title="Delete row" onclick="deleteItem(${txnId})">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

}

function getSubcats(cat) {
  return (categories[cat] || []);
}

/* ── Field change → auto-save ── */
function onFieldChange(el) {
  const txnId = parseInt(el.dataset.txn);
  const field  = el.dataset.field;
  const row    = el.closest('tr');
  const item   = currentItems.find(i => i.transaction_id === txnId);
  if (!item) return;

  item[field] = el.value;

  // If category changed, repopulate subcategory datalist
  if (field === 'category') {
    syncSubDatalist(txnId);
  }

  // Update pred-hint changed indicator for category and subcategory
  if (field === 'category' || field === 'subcategory') {
    const hint = el.closest('td').querySelector('.pred-hint');
    if (hint) hint.classList.toggle('changed', item[field] !== (item[`pred_${field}`] || ''));
  }

  saveItem(txnId, item.category, item.subcategory, item.type, row);
}

async function saveItem(txnId, category, subcategory, type, row) {
  if (!currentBatch) return;
  row.classList.add('saving');
  try {
    const resp = await apiCall(
      `/api/batches/${currentBatch.id}/items/${txnId}`,
      {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, subcategory, type }),
      }
    );
    if (!resp.ok) throw new Error('Save failed');
    row.classList.remove('saving');
    flashSaved(row);
  } catch (e) {
    row.classList.remove('saving');
    showToast('Failed to save ✗', 'error');
  }
}

function flashSaved(row) {
  row.classList.add('saved');
  setTimeout(() => row.classList.remove('saved'), 1200);
}

/* ── Revert to prediction ── */
async function revertItem(txnId) {
  const item = currentItems.find(i => i.transaction_id === txnId);
  if (!item) return;
  const row = document.querySelector(`tr[data-txn="${txnId}"]`);

  item.category    = item.pred_category    || '';
  item.subcategory = item.pred_subcategory || '';
  item.type        = item.pred_type        || '';

  row.querySelector('[data-field="category"]').value    = item.category;
  row.querySelector('[data-field="subcategory"]').value = item.subcategory;
  row.querySelector('[data-field="type"]').value        = item.type;

  syncSubDatalist(txnId);

  // All values now match prediction — clear changed indicators
  row.querySelectorAll('.pred-hint').forEach(el => el.classList.remove('changed'));

  await saveItem(txnId, item.category, item.subcategory, item.type, row);
}

/* ── Delete row from batch ── */
async function deleteItem(txnId) {
  if (!currentBatch) return;
  if (!confirm('Remove this row from the batch?')) return;
  try {
    const resp = await apiCall(
      `/api/batches/${currentBatch.id}/items/${txnId}`,
      { method: 'DELETE' }
    );
    if (!resp.ok) throw new Error('Delete failed');
    document.querySelector(`tr[data-txn="${txnId}"]`)?.remove();
    currentItems = currentItems.filter(i => i.transaction_id !== txnId);
    currentBatch.row_count = Math.max(0, currentBatch.row_count - 1);
    updateBatchHeader();
    showToast('Row deleted ✓');
    await loadBatches();
  } catch (e) {
    showToast('Failed to delete row', 'error');
  }
}

/* ── Mark reviewed ── */
async function markReviewed() {
  if (!currentBatch) return;
  const btn = document.getElementById('btnMarkReviewed');
  btn.disabled = true;
  try {
    const resp = await apiCall(`/api/batches/${currentBatch.id}/mark-reviewed`, { method: 'POST' });
    if (!resp.ok) throw new Error((await resp.json()).description || 'Failed');
    currentBatch.status = 'reviewed';
    updateBatchHeader();
    document.getElementById('batchSubtitle').textContent =
      `${currentBatch.row_count} items · reviewed`;
    showToast('Batch marked as reviewed ✓');
    await loadBatches();
  } catch (e) {
    btn.disabled = false;
    showToast(`Error: ${e.message}`, 'error');
  }
}

/* ── Complete batch ── */
async function completeBatch() {
  if (!currentBatch) return;
  if (currentBatch.status !== 'reviewed') {
    showToast('Mark as reviewed first.', 'error');
    return;
  }
  const btn = document.getElementById('btnComplete');
  btn.disabled = true;
  btn.textContent = 'Completing…';
  try {
    const resp = await apiCall(`/api/batches/${currentBatch.id}/complete`, { method: 'POST' });
    if (!resp.ok) throw new Error((await resp.json()).description || 'Failed');
    const data = await resp.json();
    showToast(`Batch complete — ${data.inserted} rows saved ✓`);

    // Reset to empty state
    currentBatch = null;
    currentItems = [];
    document.getElementById('batchView').style.display = 'none';
    document.getElementById('emptyState').style.display = '';
    await loadBatches();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✦ Complete Batch';
    showToast(`Error: ${e.message}`, 'error');
  }
}

/* ── Init ── */
async function init() {
  setupTheme();
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  try {
    const resp = await apiCall('/api/categories');
    if (resp.ok) {
      categories = await resp.json();
      populateCatDatalist();
    }
  } catch (_) {}

  await loadBatches();
}

init();
</script>
</body>
</html>
